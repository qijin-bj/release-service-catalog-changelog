name: Run Ollama AI Agent

on:
  workflow_dispatch:
  pull_request:
    branches: [development]

jobs:
  ollama-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0  # required for full git history

      - name: Set up Git
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

      - name: Get commits from last 24 hours
        run: |
          echo "Commits in the past 24 hours:"
          git log --since="24 hours ago" --pretty=format:"%h - %an: %s" > summary.txt
          cat summary.txt

      - name: Cache Ollama models
        uses: actions/cache@v3
        with:
          path: ~/.ollama
          key: ollama-models-${{ runner.os }}

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Pull Ollama image
        run: docker pull ollama/ollama

      - name: Start Ollama container
        run: |
          docker run -d --name ollama \
            -p 11434:11434 \
            -v ~/.ollama:/root/.ollama \
            ollama/ollama
