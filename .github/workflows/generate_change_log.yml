---
name: Run Ollama AI Agent

on:
  workflow_dispatch:
  pull_request:
    branches: [development]

jobs:
  ollama-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Authenticate GitHub CLI
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | gh auth login --with-token

      - name: List merged PRs from last day
        run: |
          YESTERDAY=$(date -u -d "6 day ago" +"%Y-%m-%d")
          gh pr list \
            --repo konflux-ci/release-service-catalog \
            --state merged \
            --search "merged:>=$YESTERDAY" \
            --json number,title,url,mergedAt > merged_prs.json

      - name: Get commits for each PR and save combined info
        id: get-commits
        run: |
          python3 << 'EOF'
          import os, json, subprocess

          # Load merged PRs
          with open("merged_prs.json", "r") as f:
              prs = json.load(f)

          all_data = []

          for pr in prs:
              pr_number = pr["number"]

              # Get commits using gh
              result = subprocess.run(
                  [
                    "gh",
                    "pr",
                    "view",
                    str(pr_number),
                    "--json",
                    "commits",
                    "--jq",
                    ".commits[] | {sha: .oid, message: .messageBody, title: .messageHeadline}"],
                  capture_output=True, text=True
              )

              # Parse commits
              commits = []
              for line in result.stdout.strip().splitlines():
                  try:
                      commits.append(json.loads(line))
                  except json.JSONDecodeError:
                      # fallback if line is not JSON
                      commits.append({"sha": line.strip(), "message": ""})

              pr["commits"] = commits
              all_data.append(pr)

          # Save combined info
          with open("summary.txt", "w", encoding="utf-8") as f:
              json.dump(all_data, f, indent=2, ensure_ascii=False)
          EOF
      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Pull Ollama image
        run: docker pull ollama/ollama

      - name: Start Ollama container
        run: |
          docker run -d --name ollama \
            -p 11434:11434 \
            -v ~/.ollama:/root/.ollama \
            ollama/ollama
      - name: Wait for Ollama to be ready
        run: |
          echo "Waiting for Ollama to start..."
          for i in {1..20}; do
            curl -s http://localhost:11434/api/tags && break || sleep 3
          done
      - name: Pull Ollama model
        run: |
          mkdir -p ollama_cache
          cd ollama_cache
          curl http://localhost:11434/api/pull \
             -d '{"name": "llama3"}' \
             -H "Content-Type: application/json"
      - name: Cache Ollama models
        uses: actions/cache@v3
        with:
          path: ollama_cache
          key: ollama-models-${{ runner.os }}

      - name: Install Python dependencies
        run: pip install requests

      - name: Run LLM agent
        id: run-llm
        run: |
          python ollama_prompt.py > summary_output.txt
          echo "summary<<EOF" >> $GITHUB_OUTPUT
          cat summary_output.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        env:
          COMMITS_FILE: summary.txt

      - name: Send email with summary
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "Release Service Catalog weekly update"
          body: |
            Hi,
            Here is release service catalog weekly update from staging branch:
            ${{ steps.run-llm.outputs.summary }}
          to: jinqi@redhat.com
          from: ${{ secrets.SMTP_USERNAME }}
          secure: true
